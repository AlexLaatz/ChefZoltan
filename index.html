const grid = document.getElementById('grid');
const search = document.getElementById('search');
const filtersEl = document.getElementById('filters');
const overlay = document.getElementById('overlay');
const detail = document.getElementById('detail');

const categories = ['All', ...new Set(RECIPES.map(r => r.category))];
let activeCategory = 'All';

function speckleSeed(i){
  // deterministic pseudo-random speckle placement per card
  const seeds = [];
  let x = i * 999331 % 97;
  for(let n=0;n<14;n++){
    x = (x * 48271) % 233280;
    seeds.push(x / 233280);
  }
  return seeds;
}

function speckleBackground(i){
  const s = speckleSeed(i);
  let layers = [];
  for(let n=0;n<7;n++){
    const x = (s[n*2] * 100).toFixed(1);
    const y = (s[n*2+1] * 100).toFixed(1);
    const size = (1 + s[n] * 2).toFixed(1);
    const light = n % 2 === 0;
    layers.push(`radial-gradient(circle at ${x}% ${y}%, ${light ? 'rgba(232,226,214,0.5)' : 'rgba(20,18,16,0.35)'} 0px, transparent ${size}px)`);
  }
  return layers.join(',');
}

function renderFilters(){
  filtersEl.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
    btn.onclick = () => { activeCategory = cat; renderFilters(); renderGrid(); };
    filtersEl.appendChild(btn);
  });
}

function renderGrid(){
  const query = search.value.trim().toLowerCase();
  grid.innerHTML = '';

  const filtered = RECIPES.filter(r => {
    const matchesCategory = activeCategory === 'All' || r.category === activeCategory;
    const haystack = (r.title + ' ' + r.ingredients.join(' ')).toLowerCase();
    const matchesQuery = haystack.includes(query);
    return matchesCategory && matchesQuery;
  });

  if(filtered.length === 0){
    grid.innerHTML = '<p class="empty">No recipes match yet. Try a different search.</p>';
    return;
  }

  filtered.forEach((r) => {
    const idx = RECIPES.indexOf(r);
    const card = document.createElement('article');
    card.className = 'card';
    card.style.setProperty('--speckle', speckleBackground(idx));
    const imageBlock = r.image
      ? `<div class="card-image" style="background-image:url('${r.image}')"></div>`
      : `<div class="card-image card-image-empty"><span>${r.title.charAt(0)}</span></div>`;
    card.innerHTML = `
      ${imageBlock}
      <div class="card-speckle"></div>
      <div class="card-body">
        <p class="card-cat">${r.category}</p>
        <h3>${r.title}</h3>
        <div class="card-meta">
          <span>${r.calories} cal</span>
        </div>
      </div>
    `;
    card.querySelector('.card-speckle').style.background = speckleBackground(idx);
    card.onclick = () => openDetail(idx);
    grid.appendChild(card);
  });
}

function openDetail(idx){
  const r = RECIPES[idx];
  const detailImage = r.image
    ? `<div class="detail-image" style="background-image:url('${r.image}')"></div>`
    : `<div class="detail-image detail-image-empty"><span>${r.title.charAt(0)}</span></div>`;
  detail.innerHTML = `
    <button class="close-btn" id="closeBtn">&times;</button>
    ${detailImage}
    <div class="detail-body">
      <p class="card-cat">${r.category}</p>
      <h2>${r.title}</h2>
      <div class="card-meta">
        <span>${r.calories} cal</span>
      </div>
      <div class="detail-columns">
        <div>
          <h4>Ingredients</h4>
          <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
        <div>
          <h4>Steps</h4>
          <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
        </div>
      </div>
      ${r.notes ? `<p class="notes"><strong>Note:</strong> ${r.notes}</p>` : ''}
    </div>
  `;
  overlay.classList.add('open');
  document.getElementById('closeBtn').onclick = closeDetail;
}

function closeDetail(){
  overlay.classList.remove('open');
}

overlay.onclick = (e) => { if(e.target === overlay) closeDetail(); };
search.addEventListener('input', renderGrid);

renderFilters();
renderGrid();
</script>
